# Regenerates all automated documentation pages whenever a new Solo release is
# published. This workflow is triggered in one of two ways:
#
#   1. Automatically - via a repository_dispatch event (type: "solo-release")
#      sent from the hiero-ledger/solo repo's release workflow. The event
#      payload contains `version` (the release tag, e.g. "v0.66.0") and
#      `release_url`.
#
#   2. Manually - via workflow_dispatch, allowing maintainers to re-generate
#      docs for any existing tag or for `main` without waiting for a release.
#
# What this workflow does (in order):
#   1.  Check out this (solo-docs) repo onto the runner.
#   2.  Check out the hiero-ledger/solo repo at the requested release tag into
#       the sub-directory ./solo-src/.
#   3.  Set up Node.js, task (go-task), kubectl, Helm, and Kind.
#   4.  Build solo from the checked-out source and install it globally so the
#       `solo` binary is on PATH for the generation scripts to call.
#   5.  Run scripts/executeUpdateDocs.mjs - spins up a Kind cluster, runs
#       the full Solo CLI lifecycle, captures output, renders Markdown templates
#       into content/en/docs/.
#   6.  Run scripts/generateHelp.mjs - runs `solo --help` at every command
#       depth and writes content/en/docs/solo-commands.md.
#   7.  Commit any changed files back to this repo on the main branch so that
#       the next Hugo build picks up the freshly generated content.
#   8.  Build the Hugo site with GitHub Pages baseURL and deploy to GitHub Pages.
#
# Required secrets:
#   - GITHUB_TOKEN: built-in token with `contents: write` for pushing generated docs

name: "Update Generated Docs"

on:
  # Triggered automatically from hiero-ledger/solo when a release is published.
  repository_dispatch:
    types: [solo-release]

  # Allow manual re-runs for any tag or for `main`.
  workflow_dispatch:
    inputs:
      version:
        description: "Solo release tag to generate docs for (e.g. v0.66.0) or 'main'"
        required: false
        default: "main"
      deployment_target:
        description: "Deployment target for baseURL"
        required: false
        default: "solo.hiero.org"
        type: choice
        options:
          - "solo.hiero.org"
          - "gh-pages"
          - "custom"
      custom_baseurl:
        description: "Custom baseURL if deployment_target is 'custom'"
        required: false
        default: ""

# Allow only one doc-update run at a time to prevent conflicting commits.
concurrency:
  group: update-docs
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  update-docs:
    name: Generate and commit docs
    runs-on: hl-solo-docs-lin
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      # Checkout solo-docs (this repo).
      - name: Checkout solo-docs
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Tool setup.
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.23.3"

      # setup pages
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        with:
          enablement: true

      # npm ci this also installs hugo and docsy
      - name: Install npm dependencies
        run: npm ci

      # Map the selected deployment target to a Hugo baseURL. For the automated
      # repository_dispatch (solo-release) path there are no inputs, so this
      # falls back to the production site (solo.hiero.org).
      - name: Resolve baseURL
        id: baseurl
        run: |
          TARGET="${{ github.event.inputs.deployment_target || 'solo.hiero.org' }}"
          case "$TARGET" in
            solo.hiero.org) URL="https://solo.hiero.org/" ;;
            gh-pages)       URL="https://hiero-ledger.github.io/solo-docs/" ;;
            custom)         URL="${{ github.event.inputs.custom_baseurl }}" ;;
            *)              URL="https://solo.hiero.org/" ;;
          esac
          echo "baseurl=$URL" >> "$GITHUB_OUTPUT"
          echo "::notice::Resolved baseURL: $URL (deployment target: $TARGET)"

      # hugo build with the resolved baseURL for the selected deployment target
      - name: Build Hugo site
        run: npm run _hugo -- --minify --baseURL "${{ steps.baseurl.outputs.baseurl }}"

      # Derive the solo release tag from the version the pre_hugo fetch resolved
      # (.cache/solo-cli-docs/version.txt, written during "Build Hugo site"), so the
      # error-page source matches the released CLI reference. e.g. 0.78.0 -> v0.78.0
      - name: Resolve solo source tag
        id: solo-tag
        run: |
          version="$(tr -d '[:space:]' < .cache/solo-cli-docs/version.txt)"
          if [[ -z "$version" ]]; then
            echo "::error::.cache/solo-cli-docs/version.txt is empty or missing; the Hugo build's pre_hugo fetch must run first."
            exit 1
          fi
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "::notice::Checking out solo source at tag v${version}"

      # Checkout the solo source at the released tag so the error-page generator can
      # read its TypeScript source files.
      - name: Checkout solo source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: hiero-ledger/solo
          ref: ${{ steps.solo-tag.outputs.tag }}
          path: solo-src

      # Generate the SoloError documentation pages from the checked-out solo source.
      - name: Generate error code pages
        run: npm run generate-errors
        env:
          SOLO_REPO_PATH: ${{ github.workspace }}/solo-src

      # upload go gh-pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: public

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
