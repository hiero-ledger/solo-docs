# Regenerates all automated documentation pages whenever a new Solo release is
# published. This workflow is triggered in one of two ways:
#
#   1. Automatically - via a repository_dispatch event (type: "solo-release")
#      sent from the hiero-ledger/solo repo's release workflow. The event
#      payload contains `version` (the release tag, e.g. "v0.66.0") and
#      `release_url`.
#
#   2. Manually - via workflow_dispatch, allowing maintainers to re-generate
#      docs for any existing tag or for `main` without waiting for a release.
#
# What this workflow does (in order):
#   1.  Check out this (solo-docs) repo onto the runner.
#   2.  Check out the hiero-ledger/solo repo at the requested release tag into
#       the sub-directory ./solo-src/.
#   3.  Set up Node.js, task (go-task), kubectl, Helm, and Kind.
#   4.  Build solo from the checked-out source and install it globally so the
#       `solo` binary is on PATH for the generation scripts to call.
#   5.  Run scripts/executeUpdateDocs.mjs - spins up a Kind cluster, runs
#       the full Solo CLI lifecycle, captures output, renders Markdown templates
#       into content/en/docs/.
#   6.  Run scripts/generateHelp.mjs - runs `solo --help` at every command
#       depth and writes content/en/docs/solo-commands.md.
#   7.  Commit any changed files back to this repo on the main branch so that
#       the next Hugo build picks up the freshly generated content.
#   8.  Build the Hugo site with GitHub Pages baseURL and deploy to GitHub Pages.
#
# Required secrets:
#   - GITHUB_TOKEN: built-in token with `contents: write` for pushing generated docs

name: "Update Generated Docs"

on:
  # Triggered automatically from hiero-ledger/solo when a release is published.
  repository_dispatch:
    types: [solo-release]

  # Allow manual re-runs for any tag or for `main`.
  workflow_dispatch:
    inputs:
      version:
        description: "Solo release tag to generate docs for (e.g. v0.66.0) or 'main'"
        required: false
        default: "main"
      deployment_target:
        description: "Deployment target for baseURL (used for testing different URLs)"
        required: false
        default: "gh-pages"
        type: choice
        options:
          - gh-pages
          - solo.hiero.org
          - custom
      custom_baseurl:
        description: "Custom baseURL (required if deployment_target is 'custom')"
        required: false
        default: ""

# Allow only one doc-update run at a time to prevent conflicting commits.
concurrency:
  group: update-docs
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  update-docs:
    name: Generate and commit docs
    runs-on: hl-solo-docs-lin
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      # Resolve the release version.
      # For repository_dispatch: use client_payload.version (set by solo's
      #   flow-trigger-solo-docs-update.yaml).
      # For workflow_dispatch:   use the manual `version` input.
      - name: Resolve release version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          # Fallback to 'main' if neither path provided a value.
          VERSION="${VERSION:-main}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Generating docs for Solo version: ${VERSION}"

      # Resolve the baseURL for Hugo build based on deployment target.
      # For repository_dispatch: use GitHub Pages (automatic production deployment)
      # For workflow_dispatch: use deployment_target input (gh-pages, solo.hiero.org, or custom)
      - name: Resolve baseURL
        id: baseurl
        run: |
          DEPLOYMENT_TARGET="${{ inputs.deployment_target }}"

          # For automatic deployments, always use GitHub Pages
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            DEPLOYMENT_TARGET="gh-pages"
            echo "Auto-deployment detected: using GitHub Pages baseURL"
          fi

          # Set baseURL based on deployment target
          case "${DEPLOYMENT_TARGET}" in
            gh-pages)
              BASEURL="https://hiero-ledger.github.io/solo-docs/"
              echo "✓ Deployment target: GitHub Pages"
              ;;
            solo.hiero.org)
              BASEURL="https://solo.hiero.org/"
              echo "✓ Deployment target: solo.hiero.org"
              ;;
            custom)
              CUSTOM_URL="${{ inputs.custom_baseurl }}"
              if [[ -z "${CUSTOM_URL}" ]]; then
                echo "Error: custom deployment_target selected but custom_baseurl is empty"
                exit 1
              fi
              # Ensure URL ends with /
              BASEURL="${CUSTOM_URL%/}/"
              echo "✓ Deployment target: Custom URL"
              ;;
            *)
              echo "Error: Unknown deployment_target '${DEPLOYMENT_TARGET}'"
              exit 1
              ;;
          esac

          echo "baseurl=${BASEURL}" >> "${GITHUB_OUTPUT}"
          echo "Using baseURL: ${BASEURL}"

      # Checkout solo-docs (this repo).
      - name: Checkout solo-docs
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Tool setup.
      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # pinned to v6.3.0
        with:
          go-version-file: "go.mod"
          go-version: "1.23.3"

      # hugo action setup
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f # v3.0.0
        with:
          hugo-version: "0.156.0"
          extended: true

      # setup pages
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        with:
          enablement: true

      # npm ci
      - name: Install npm dependencies
        run: npm ci

      # hugo build with resolved baseURL for the selected deployment target
      - name: Build Hugo site
        run: npm run build:production -- --baseURL "${{ steps.baseurl.outputs.baseurl }}"

      # upload go gh-pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: public

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
